<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Site</title>
<meta name="description" content="">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#ffffff;
    --ink:#111827;
    --muted:#6b7280;
    --faint:#9ca3af;
    --accent:#2563eb;
    --accent-soft:#eff6ff;
    --line:#e5e7eb;
    --card:#ffffff;
    --maxw:720px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:16px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline;text-underline-offset:2px}

  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

  /* ---------- nav ---------- */
  nav{
    position:sticky;top:0;z-index:10;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:52px}
  nav .home{font-weight:700;font-size:15px;color:var(--ink)}
  nav ul{display:flex;gap:20px;list-style:none}
  nav ul a{color:var(--muted);font-size:14px;font-weight:500}
  nav ul a:hover{color:var(--ink);text-decoration:none}

  /* ---------- hero ---------- */
  header{padding:56px 0 36px}
  .hero{display:grid;grid-template-columns:1fr 160px;gap:32px;align-items:start}
  .hero-photo{
    width:100%;aspect-ratio:4/5;border-radius:10px;
    object-fit:cover;border:1px solid var(--line);background:var(--accent-soft);
    justify-self:end;
  }
  .hero-initials{
    display:flex;align-items:center;justify-content:center;
    font-size:34px;font-weight:700;
    color:var(--accent);letter-spacing:-.02em;user-select:none;
  }
  .hero h1{
    font-weight:700;font-size:32px;
    line-height:1.15;letter-spacing:-.02em;margin-bottom:8px;
  }
  .hero .role{color:var(--muted);font-size:14px;font-weight:500;margin-bottom:16px}
  .hero .role strong{color:var(--ink);font-weight:600}
  .hero .bio{font-size:15px;color:var(--muted);line-height:1.7;max-width:52ch}
  .hero .bio + .bio{margin-top:8px}

  /* ---------- link row ---------- */
  .links{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
  .links a{
    font-size:13px;font-weight:500;
    color:var(--ink);border:1px solid var(--line);background:var(--bg);
    padding:4px 12px;border-radius:6px;transition:.15s;
  }
  .links a:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}

  /* ---------- sections ---------- */
  section{padding:0 0 32px}
  section>.wrap{border-top:1px solid var(--line);padding-top:32px}
  .eyebrow{
    font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:20px;
  }

  /* ---------- news ---------- */
  .feed{position:relative;padding-left:20px}
  .feed::before{
    content:"";position:absolute;left:3px;top:6px;bottom:6px;width:1px;background:var(--line);
  }
  .entry{position:relative;padding-bottom:18px}
  .entry:last-child{padding-bottom:0}
  .entry::before{
    content:"";position:absolute;left:-20px;top:7px;
    width:7px;height:7px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 3px var(--bg);
  }
  .entry time{font-size:12px;font-weight:500;color:var(--faint);display:block;margin-bottom:2px}
  .entry p{font-size:15px;color:var(--muted)}
  .entry .tag{font-weight:600;color:var(--ink)}

  /* ---------- papers ---------- */
  .paper{padding:14px 0;border-bottom:1px solid var(--line)}
  .paper:last-child{border-bottom:none}
  .paper h3{font-size:16px;font-weight:600;margin-bottom:4px}
  .paper .authors{font-size:14px;color:var(--muted);margin-bottom:3px}
  .paper .venue{font-size:12px;font-weight:500;color:var(--faint);margin-bottom:8px}
  .paper .clinks{display:flex;gap:12px;flex-wrap:wrap}
  .paper .clinks a{font-size:12px;font-weight:500}

  /* ---------- projects ---------- */
  .cards{display:grid;gap:12px}
  .card{
    display:flex;gap:16px;align-items:flex-start;
    border:1px solid var(--line);border-radius:8px;background:var(--card);
    padding:16px;transition:.15s;
  }
  .card:hover{border-color:#d1d5db;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .card .thumb{
    flex:0 0 80px;width:80px;height:80px;border-radius:6px;
    background:var(--accent-soft);object-fit:cover;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:600;color:var(--accent);
  }
  .card h3{font-size:16px;font-weight:600;margin-bottom:3px}
  .card .meta{font-size:12px;font-weight:500;color:var(--faint);margin-bottom:6px}
  .card p{font-size:14px;color:var(--muted);margin-bottom:8px}
  .card .clinks{display:flex;gap:12px;flex-wrap:wrap}
  .card .clinks a{font-size:12px;font-weight:500}

  /* ---------- footer ---------- */
  footer{padding:0 0 56px;color:var(--faint);font-size:13px}
  footer>.wrap{border-top:1px solid var(--line);padding-top:36px}
  footer a{color:var(--muted)}

  /* ---------- responsive ---------- */
  @media(max-width:560px){
    .hero{grid-template-columns:1fr;gap:20px}
    .hero-photo{width:100%;aspect-ratio:3/1}
    .hero-initials{font-size:28px}
    .hero h1{font-size:26px}
    nav ul{gap:16px}
    .card{flex-direction:column}
    .card .thumb{width:100%;height:120px;flex-basis:auto}
  }

  /* load animation */
  .fade{opacity:0;transform:translateY(8px);animation:rise .5s ease forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.fade{animation:none;opacity:1;transform:none}}
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <a class="home" id="nav-name" href="#">—</a>
    <ul id="nav-links"></ul>
  </div>
</nav>

<header>
  <div class="wrap">
    <div class="hero fade" id="hero"></div>
  </div>
</header>

<section id="news" style="display:none">
  <div class="wrap">
    <p class="eyebrow">News</p>
    <div class="feed" id="news-feed"></div>
  </div>
</section>

<section id="papers" style="display:none">
  <div class="wrap">
    <p class="eyebrow">Papers</p>
    <div id="papers-list"></div>
  </div>
</section>

<section id="projects" style="display:none">
  <div class="wrap">
    <p class="eyebrow">Projects</p>
    <div class="cards" id="projects-cards"></div>
  </div>
</section>

<footer>
  <div class="wrap">
    <p id="footer-text"></p>
  </div>
</footer>

<noscript><p style="text-align:center;padding:2rem;color:#6b6f76">JavaScript is required to load this page.</p></noscript>

<script>
(async () => {
  const get = url => fetch(url, { cache: 'no-cache' }).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });

  const [profile, news, papers, projects] = await Promise.all([
    get('data/profile.json'),
    get('data/news.json').catch(() => []),
    get('data/papers.json').catch(() => []),
    get('data/projects.json').catch(() => []),
  ]);

  // --- profile ---
  document.title = profile.name;
  document.querySelector('meta[name="description"]').content = profile.description || '';
  document.getElementById('nav-name').textContent = profile.name;
  document.getElementById('footer-text').innerHTML =
    `&copy; ${new Date().getFullYear()} ${profile.name} &middot; Built as a static site, hosted on GitHub Pages.`;

  const initials = profile.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const photoHtml = profile.photo
    ? `<img class="hero-photo" src="${profile.photo}" alt="${profile.name}"
         onerror="this.outerHTML='<div class=\\'hero-photo hero-initials\\'>${initials}</div>'">`
    : `<div class="hero-photo hero-initials">${initials}</div>`;

  document.getElementById('hero').innerHTML = `
    <div>
      <h1>${profile.name}</h1>
      <p class="role">${profile.role} &middot; <strong>${profile.university}</strong></p>
      ${profile.bio.map(p => `<p class="bio">${p}</p>`).join('')}
      <div class="links">
        ${profile.links.map(l => `<a href="${l.href}">${l.label}</a>`).join('')}
      </div>
    </div>
    ${photoHtml}`;

  // --- build nav from available sections ---
  const navSections = [];
  if (news.length)     navSections.push({ href: '#news',     label: 'News' });
  if (papers.length)   navSections.push({ href: '#papers',   label: 'Papers' });
  if (projects.length) navSections.push({ href: '#projects', label: 'Projects' });
  document.getElementById('nav-links').innerHTML =
    navSections.map(s => `<li><a href="${s.href}">${s.label}</a></li>`).join('');

  // --- news ---
  if (news.length) {
    document.getElementById('news-feed').innerHTML = news.map(e => `
      <div class="entry">
        <time>${e.date}</time>
        <p><span class="tag">${e.emoji} ${e.tag}:</span> ${e.html}</p>
      </div>`).join('');
    document.getElementById('news').style.display = '';
  }

  // --- papers ---
  if (papers.length) {
    document.getElementById('papers-list').innerHTML = papers.map(p => `
      <div class="paper">
        <h3>${p.title}</h3>
        <p class="authors">${p.authors}</p>
        <p class="venue">${p.venue}</p>
        <div class="clinks">
          ${p.links.map(l => `<a href="${l.href}">${l.label}</a>`).join('')}
        </div>
      </div>`).join('');
    document.getElementById('papers').style.display = '';
  }

  // --- projects ---
  if (projects.length) {
    document.getElementById('projects-cards').innerHTML = projects.map(p => `
      <div class="card">
        ${p.image
          ? `<img class="thumb" src="${p.image}" alt="${p.title}">`
          : `<div class="thumb">${p.thumb || 'IMG'}</div>`}
        <div>
          <h3>${p.title}</h3>
          <p class="meta">${p.year} &middot; ${p.tech}</p>
          <p>${p.description}</p>
          <div class="clinks">
            ${p.links.map(l => `<a href="${l.href}">${l.label}</a>`).join('')}
          </div>
        </div>
      </div>`).join('');
    document.getElementById('projects').style.display = '';
  }
})();
</script>
</body>
</html>
